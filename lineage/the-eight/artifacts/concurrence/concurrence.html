<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Concurrence</title>
<script src="./p5.min.js"></script>
<style>
  html, body {
    margin: 0; padding: 0;
    background: #14140f;
    font-family: 'Lora', Georgia, serif;
    color: #d4cfc0;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  #title {
    margin: 28px 0 6px 0;
    font-style: italic;
    letter-spacing: 0.04em;
    font-size: 14px;
    opacity: 0.7;
  }
  #subtitle {
    margin: 0 0 22px 0;
    font-size: 11px;
    opacity: 0.45;
    letter-spacing: 0.02em;
  }
  #canvas-host {
    box-shadow: 0 4px 60px rgba(0,0,0,0.6);
    line-height: 0;
  }
  canvas { display: block; }
  #footer {
    margin: 22px 0 36px 0;
    font-size: 10.5px;
    opacity: 0.4;
    letter-spacing: 0.04em;
    font-family: 'Courier New', monospace;
  }
</style>
</head>
<body>
  <div id="title">Concurrence</div>
  <div id="subtitle">eight walks · one origin · seed <span id="seed-display">1729</span></div>
  <div id="canvas-host"></div>
  <div id="footer">noise.scale 0.0028 · force 0.085 · steps 13000/agent · alpha 20/255</div>
<script>
const params = {
  seed:          (typeof window !== 'undefined' && window.__SEED_OVERRIDE__) || 1729,
  numAgents:     8,
  noiseScale:    0.0028,
  force:         0.085,
  damping:       0.965,
  totalSteps:    13000,
  stepsPerFrame: 150,
  segmentAlpha:  20,
  segmentWidth:  1.05,
  zoffStride:    1.7,
};

const palette = [
  [ 25,  25,  30],
  [ 35,  40,  55],
  [ 45,  35,  30],
  [ 30,  45,  38],
  [ 50,  30,  48],
  [ 25,  48,  55],
  [170,  92,  48],
  [188, 148,  64],
];

const BG = [241, 235, 222];

let agents = [];
let totalStepsTaken = 0;

class Agent {
  constructor(idx, originX, originY) {
    this.idx = idx;
    this.zoff = idx * params.zoffStride + 7.31;
    const launchTheta = (idx / params.numAgents) * TWO_PI + random(-0.15, 0.15);
    const v0 = 0.9 + random(-0.2, 0.4);
    this.x = originX + cos(launchTheta) * 0.5;
    this.y = originY + sin(launchTheta) * 0.5;
    this.vx = cos(launchTheta) * v0;
    this.vy = sin(launchTheta) * v0;
    this.col = palette[idx % palette.length];
  }

  step(w, h) {
    const nx = noise(this.x * params.noiseScale,
                     this.y * params.noiseScale,
                     this.zoff) - 0.5;
    const ny = noise(this.x * params.noiseScale + 1000,
                     this.y * params.noiseScale + 1000,
                     this.zoff) - 0.5;
    this.vx += nx * params.force * 2.4;
    this.vy += ny * params.force * 2.4;

    const cx = w * 0.5, cy = h * 0.5;
    const dx = this.x - cx, dy = this.y - cy;
    const r = sqrt(dx*dx + dy*dy);
    const maxR = min(w, h) * 0.42;
    if (r > maxR && r > 0.0001) {
      const overshoot = (r - maxR) / maxR;
      const kick = 0.04 + overshoot * overshoot * 6.0;
      this.vx -= (dx / r) * kick;
      this.vy -= (dy / r) * kick;
    }

    this.vx *= params.damping;
    this.vy *= params.damping;

    const px = this.x, py = this.y;
    this.x += this.vx;
    this.y += this.vy;

    stroke(this.col[0], this.col[1], this.col[2], params.segmentAlpha);
    strokeWeight(params.segmentWidth);
    line(px, py, this.x, this.y);

    this.zoff += 0.0006;
  }
}

function setup() {
  const canvasSize = 1100;
  const c = createCanvas(canvasSize, canvasSize);
  c.parent('canvas-host');
  randomSeed(params.seed);
  noiseSeed(params.seed);
  const dsp = document.getElementById('seed-display');
  if (dsp) dsp.textContent = String(params.seed);

  background(BG[0], BG[1], BG[2]);

  const inset = 38;
  noFill();
  stroke(20, 20, 20, 28);
  strokeWeight(1);
  rect(inset, inset, width - 2*inset, height - 2*inset);

  const cx = width * 0.5, cy = height * 0.5;
  for (let i = 0; i < params.numAgents; i++) {
    agents.push(new Agent(i, cx, cy));
  }

  noStroke();
  fill(20, 20, 20, 90);
  ellipse(cx, cy, 4, 4);
}

function draw() {
  if (totalStepsTaken >= params.totalSteps * params.numAgents) {
    drawSignature();
    noLoop();
    return;
  }
  for (let s = 0; s < params.stepsPerFrame; s++) {
    for (const a of agents) {
      a.step(width, height);
      totalStepsTaken++;
    }
  }
}

function drawSignature() {
  const cx = width * 0.5, cy = height * 0.5;
  noStroke();
  fill(20, 20, 20, 60);
  ellipse(cx, cy, 6, 6);

  fill(20, 20, 20, 130);
  textFont('Courier New');
  textSize(10);
  textAlign(LEFT, BOTTOM);
  text('CONCURRENCE / ' + params.seed, 44, height - 44);

  textAlign(RIGHT, BOTTOM);
  text('coo · 2026-04-29', width - 44, height - 44);
}
</script>
</body>
</html>
